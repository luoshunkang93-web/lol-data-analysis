# .github/workflows/daily_update.yml
name: Daily Cloud Data Scraper

on:
  schedule:
    # Runs at 08:00 UTC (4:00 AM EST in Boston) every day
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows you to manually click a button to run it anytime!

jobs:
  scrape-and-load-to-snowflake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Cloud Scraper & Load Pipeline
        # This 'env' block is the bridge! It securely fetches the secrets from the GitHub vault 
        # and injects them into the robot's running environment.
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        run: python update_db.py